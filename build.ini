[project]
dirs.src = /home/wyb/project/inip
dirs.dist = %(dirs.src)s/build1/dist
name = inip
version = v1.0.0
other_info = debug
path.make = /usr/bin/make
path.cmake = /usr/bin/cmake
flags.cmake = -DINIP_ENABLE_GOOGLETEST=OFF -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++"
flags.make =

[target.aarch64-linux]
name = aarch64-linux
toolchain.file = aarch64-linux-toolchain.cmake
toolchain.internal = yes

[target.x86_64-linux]
name = x86_64-linux
toolchain.file = x86_64-linux-toolchain.cmake
toolchain.internal = yes

[target.x86_64-mingw]
name = x86_64-windows
toolchain.file = x86_64-mingw-toolchain.cmake
toolchain.internal = yes

[target.arm-linux-gnueabihf]
name = arm-linux-gnueabihf
toolchain.file = arm-linux-gnueabihf-toolchain.cmake
toolchain.internal = yes

[target.i686-linux-gnu]
name = i686-linux-gnu
toolchain.file = i686-linux-gnu-toolchain.cmake
toolchain.internal = yes

[target.riscv64-linux-gnu]
name = riscv64-linux-gnu
toolchain.file = riscv64-linux-gnu-toolchain.cmake
toolchain.internal = yes

[target.i686-mingw]
name = i686-windows
toolchain.file = i686-mingw-toolchain.cmake
toolchain.internal = yes
